# SENTINEL CONFIG
port 26379
bind 0.0.0.0

# monitor <name> <host> <port> <quorum>
# Quorum of 2 means at least 2 sentinels must agree the master is down
sentinel monitor mymaster redis-master 6379 2

# Authentication for Sentinel to talk to Master/Replicas
sentinel auth-pass mymaster admin_pass
sentinel auth-user mymaster admin

# How long to wait before declaring master "Subjectively Down" (SDOWN)
sentinel down-after-milliseconds mymaster 5000

# Failover timeout
sentinel failover-timeout mymaster 60000

# How many replicas to re-sync with new master at once
sentinel parallel-syncs mymaster 1
